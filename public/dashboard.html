<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilient Order Processor — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #242836;
            --border: #2e3345;
            --text: #e4e7ef;
            --text-muted: #8b91a5;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.15);
            --green: #00cec9;
            --green-bg: rgba(0, 206, 201, 0.1);
            --red: #ff6b6b;
            --red-bg: rgba(255, 107, 107, 0.1);
            --yellow: #feca57;
            --yellow-bg: rgba(254, 202, 87, 0.1);
            --blue: #74b9ff;
            --radius: 12px;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* === HEADER === */
        header {
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
        }

        header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        header h1 span { color: var(--accent); }

        .health-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-family: var(--mono);
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--surface-2);
            border: 1px solid var(--border);
        }

        .health-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
        }

        .health-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .health-dot.failing { background: var(--red); box-shadow: 0 0 8px var(--red); }

        /* === LAYOUT === */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-full { grid-column: 1 / -1; }

        /* === CARDS === */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h2 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .card-body { padding: 20px; }

        /* === PRODUCTS TABLE === */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 13px;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: var(--surface-2); }

        .stock-low { color: var(--red); }
        .stock-ok { color: var(--green); }

        /* === ORDER FORM === */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #5b4bd5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            background: var(--surface-2);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-small:hover { color: var(--text); border-color: var(--accent); }

        /* === RESPONSE LOG === */
        .response-log {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .response-log:empty::before {
            content: 'Le risposte API appariranno qui...';
            color: var(--text-muted);
            font-style: italic;
        }

        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .log-entry:last-child { border-bottom: none; }

        .log-time { color: var(--text-muted); }
        .log-success { color: var(--green); }
        .log-error { color: var(--red); }
        .log-info { color: var(--blue); }

        /* === METRICS === */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .metric-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .metric-value {
            font-family: var(--mono);
            font-size: 28px;
            font-weight: 600;
            margin: 4px 0;
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
        }

        .metric-value.green { color: var(--green); }
        .metric-value.red { color: var(--red); }
        .metric-value.yellow { color: var(--yellow); }
        .metric-value.blue { color: var(--blue); }
        .metric-value.accent { color: var(--accent); }

        /* === STATUS BADGES === */
        .status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-confirmed { background: var(--yellow-bg); color: var(--yellow); }
        .status-completed { background: var(--green-bg); color: var(--green); }
        .status-failed { background: var(--red-bg); color: var(--red); }
        .status-pending { background: rgba(139, 145, 165, 0.1); color: var(--text-muted); }

        /* === ORDER LOOKUP === */
        .lookup-row {
            display: flex;
            gap: 8px;
        }

        .lookup-row input { flex: 1; }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .container { padding: 16px; }
            header { padding: 16px; }
        }

        /* === ANIMATIONS === */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeIn 0.4s ease-out; }
        .card:nth-child(2) { animation-delay: 0.05s; }
        .card:nth-child(3) { animation-delay: 0.1s; }
        .card:nth-child(4) { animation-delay: 0.15s; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

<header>
    <h1><span>&#9678;</span> Resilient Order Processor</h1>
    <div class="health-badge" id="health-badge">
        <div class="health-dot" id="health-dot"></div>
        <span id="health-text">Checking...</span>
    </div>
</header>

<div class="container">

    <!-- ROW 1: Products + Create Order -->
    <div class="grid">
        <div class="card">
            <div class="card-header">
                <h2>&#128230; Prodotti</h2>
                <button class="btn-small" onclick="loadProducts()">Refresh</button>
            </div>
            <div class="card-body" style="padding: 0;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Prezzo</th>
                            <th>Stock</th>
                        </tr>
                    </thead>
                    <tbody id="products-table">
                        <tr><td colspan="4" style="text-align:center; color: var(--text-muted)">Caricamento...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>&#128722; Crea Ordine</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Prodotto</label>
                    <select id="order-product">
                        <option value="">Caricamento...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantità</label>
                    <input type="number" id="order-quantity" value="1" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>Idempotency Key (opzionale)</label>
                    <input type="text" id="order-idempotency" placeholder="Lascia vuoto per generare automaticamente">
                </div>
                <button class="btn btn-primary" onclick="createOrder()">
                    &#9889; Crea Ordine
                </button>
            </div>
        </div>
    </div>

    <!-- ROW 2: Order Lookup + Response Log -->
    <div class="grid">
        <div class="card">
            <div class="card-header">
                <h2>&#128269; Cerca Ordine</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Order ID (UUID)</label>
                    <div class="lookup-row">
                        <input type="text" id="lookup-id" placeholder="es: 5ac4f18a-52fa-44fc-bc25-2da44061360c">
                        <button class="btn btn-primary" onclick="lookupOrder()" style="white-space:nowrap">Cerca</button>
                    </div>
                </div>
                <div id="lookup-result"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>&#128203; Response Log</h2>
                <button class="btn-small" onclick="clearLog()">Pulisci</button>
            </div>
            <div class="card-body">
                <div class="response-log" id="response-log"></div>
            </div>
        </div>
    </div>

    <!-- ROW 3: Metrics -->
    <div class="grid">
        <div class="card grid-full">
            <div class="card-header">
                <h2>&#128200; Metriche</h2>
                <button class="btn-small" onclick="loadMetrics()">Refresh</button>
            </div>
            <div class="card-body">
                <div class="metrics-grid" id="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-label">Caricamento...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ROW 4: Recent Orders -->
    <div class="grid">
        <div class="card grid-full">
            <div class="card-header">
                <h2>&#128195; Ordini Recenti</h2>
                <button class="btn-small" onclick="loadOrders()">Refresh</button>
            </div>
            <div class="card-body" style="padding: 0;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Prodotto</th>
                            <th>Qtà</th>
                            <th>Totale</th>
                            <th>Status</th>
                            <th>Creato</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table">
                        <tr><td colspan="6" style="text-align:center; color: var(--text-muted)">Caricamento...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    const API = '';

    // === HEALTH CHECK ===
    async function checkHealth() {
        try {
            const res = await fetch(`${API}/health`);
            const data = await res.json();
            const dot = document.getElementById('health-dot');
            const text = document.getElementById('health-text');

            if (data.status === 'ok') {
                dot.className = 'health-dot ok';
                text.textContent = `DB: ${data.checks.database} | RMQ: ${data.checks.rabbitmq}`;
            } else {
                dot.className = 'health-dot failing';
                text.textContent = `DEGRADED — DB: ${data.checks.database} | RMQ: ${data.checks.rabbitmq}`;
            }
        } catch (e) {
            document.getElementById('health-dot').className = 'health-dot failing';
            document.getElementById('health-text').textContent = 'Offline';
        }
    }

    // === PRODUCTS ===
    async function loadProducts() {
        try {
            const res = await fetch(`${API}/products`);
            const products = await res.json();
            const tbody = document.getElementById('products-table');
            const select = document.getElementById('order-product');

            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td style="font-family: var(--sans)">${p.name}</td>
                    <td>&euro; ${parseFloat(p.price).toFixed(2)}</td>
                    <td class="${p.stock <= 5 ? 'stock-low' : 'stock-ok'}">${p.stock}</td>
                </tr>
            `).join('');

            select.innerHTML = products.map(p =>
                `<option value="${p.id}">${p.name} — €${parseFloat(p.price).toFixed(2)} (stock: ${p.stock})</option>`
            ).join('');
        } catch (e) {
            document.getElementById('products-table').innerHTML =
                '<tr><td colspan="4" style="color: var(--red)">Errore caricamento</td></tr>';
        }
    }

    // === CREATE ORDER ===
    async function createOrder() {
        const productId = parseInt(document.getElementById('order-product').value);
        const quantity = parseInt(document.getElementById('order-quantity').value);
        const idempotencyKey = document.getElementById('order-idempotency').value.trim();

        if (!productId || !quantity) {
            addLog('Seleziona un prodotto e una quantità', 'error');
            return;
        }

        const headers = { 'Content-Type': 'application/json' };
        if (idempotencyKey) {
            headers['Idempotency-Key'] = idempotencyKey;
        }

        try {
            const res = await fetch(`${API}/orders`, {
                method: 'POST',
                headers,
                body: JSON.stringify({ product_id: productId, quantity })
            });

            const data = await res.json();

            if (res.ok) {
                const idempotent = data.idempotent ? ' (IDEMPOTENT — ordine già esistente)' : '';
                addLog(
                    `✓ Ordine ${data.order.id.substring(0, 8)}... creato — ` +
                    `${data.order.product_name} x${data.order.quantity} = €${data.order.total_price} ` +
                    `[${data.order.status}]${idempotent}`,
                    'success'
                );
                loadProducts();
                loadOrders();
                loadMetrics();
            } else {
                addLog(`✗ Errore ${data.error.code}: ${data.error.message}`, 'error');
            }
        } catch (e) {
            addLog(`✗ Connessione fallita: ${e.message}`, 'error');
        }
    }

    // === LOOKUP ORDER ===
    async function lookupOrder() {
        const id = document.getElementById('lookup-id').value.trim();
        if (!id) {
            addLog('Inserisci un Order ID', 'error');
            return;
        }

        try {
            const res = await fetch(`${API}/orders/${id}`);
            const data = await res.json();
            const container = document.getElementById('lookup-result');

            if (res.ok) {
                const o = data.order;
                container.innerHTML = `
                    <div style="margin-top: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 13px;">
                        <div style="margin-bottom: 8px"><strong>Prodotto:</strong> ${o.product_name}</div>
                        <div style="margin-bottom: 8px"><strong>Quantità:</strong> ${o.quantity}</div>
                        <div style="margin-bottom: 8px"><strong>Totale:</strong> €${o.total_price}</div>
                        <div style="margin-bottom: 8px"><strong>Status:</strong> <span class="status status-${o.status}">${o.status}</span></div>
                        ${o.failure_reason ? `<div style="margin-bottom: 8px"><strong>Errore:</strong> <span style="color: var(--red)">${o.failure_reason}</span></div>` : ''}
                        <div><strong>Creato:</strong> ${new Date(o.created_at).toLocaleString('it-IT')}</div>
                    </div>
                `;
                addLog(`ℹ Ordine ${id.substring(0, 8)}... trovato: ${o.status}`, 'info');
            } else {
                container.innerHTML = `<div style="margin-top: 12px; color: var(--red); font-size: 13px">Ordine non trovato</div>`;
                addLog(`✗ Ordine ${id.substring(0, 8)}... non trovato`, 'error');
            }
        } catch (e) {
            addLog(`✗ Errore ricerca: ${e.message}`, 'error');
        }
    }

    // === ORDERS LIST ===
    async function loadOrders() {
        try {
            const res = await fetch(`${API}/orders/list`);
            if (!res.ok) throw new Error('Endpoint non disponibile');
            const data = await res.json();
            renderOrders(data.orders);
        } catch (e) {
            // Fallback: l'endpoint /orders/list potrebbe non esistere ancora
            document.getElementById('orders-table').innerHTML =
                '<tr><td colspan="6" style="text-align:center; color: var(--text-muted)">Crea un ordine per vederlo qui</td></tr>';
        }
    }

    function renderOrders(orders) {
        const tbody = document.getElementById('orders-table');
        if (!orders || orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--text-muted)">Nessun ordine</td></tr>';
            return;
        }

        tbody.innerHTML = orders.map(o => `
            <tr style="cursor: pointer" onclick="document.getElementById('lookup-id').value='${o.id}'; lookupOrder();">
                <td>${o.id.substring(0, 8)}...</td>
                <td style="font-family: var(--sans)">${o.product_name || 'N/A'}</td>
                <td>${o.quantity}</td>
                <td>&euro; ${parseFloat(o.total_price).toFixed(2)}</td>
                <td><span class="status status-${o.status}">${o.status}</span></td>
                <td style="color: var(--text-muted)">${new Date(o.created_at).toLocaleString('it-IT')}</td>
            </tr>
        `).join('');
    }

    // === METRICS ===
    async function loadMetrics() {
        try {
            const res = await fetch(`${API}/metrics`);
            const data = await res.json();
            const grid = document.getElementById('metrics-grid');

            const counters = data.counters || {};
            const timings = data.timings || {};

            const cards = [];

            cards.push(metricCard('Ordini Creati', counters.orders_created || 0, 'green'));
            cards.push(metricCard('Falliti (Stock)', counters.orders_failed_stock || 0, 'red'));
            cards.push(metricCard('Falliti (Disponibilità)', counters.orders_failed_availability || 0, 'yellow'));
            cards.push(metricCard('Circuit Breaker', counters.orders_failed_circuit_breaker || 0, 'accent'));

            if (timings.order_creation_time) {
                cards.push(metricCard('Tempo Medio', timings.order_creation_time.avg_ms + ' ms', 'blue'));
                cards.push(metricCard('Tempo Max', timings.order_creation_time.max_ms + ' ms', 'blue'));
            }

            grid.innerHTML = cards.join('');
        } catch (e) {
            document.getElementById('metrics-grid').innerHTML =
                '<div class="metric-card"><div class="metric-label">Metriche non disponibili</div></div>';
        }
    }

    function metricCard(label, value, color) {
        return `
            <div class="metric-card">
                <div class="metric-label">${label}</div>
                <div class="metric-value ${color}">${value}</div>
            </div>
        `;
    }

    // === RESPONSE LOG ===
    function addLog(message, type = 'info') {
        const log = document.getElementById('response-log');
        const time = new Date().toLocaleTimeString('it-IT');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
        log.insertBefore(entry, log.firstChild);

        // Mantieni max 50 entries
        while (log.children.length > 50) {
            log.removeChild(log.lastChild);
        }
    }

    function clearLog() {
        document.getElementById('response-log').innerHTML = '';
    }

    // === INIT ===
    checkHealth();
    loadProducts();
    loadMetrics();
    loadOrders();

    // Auto-refresh ogni 10 secondi
    setInterval(checkHealth, 10000);
    setInterval(loadMetrics, 15000);
</script>

</body>
</html>
